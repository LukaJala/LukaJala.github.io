<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Finger Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #e8e8e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      gap: 24px;
    }

    header {
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 6px;
      font-size: 0.88rem;
      color: #666;
    }

    /* ── camera + canvas overlay ── */
    .video-wrap {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08),
                  0 8px 48px rgba(0,0,0,0.7),
                  0 0 60px rgba(56,189,248,0.12);
      background: #111;
      /* clamp so it doesn't go off-screen */
      max-width: min(640px, 100vw - 32px);
      width: 100%;
      aspect-ratio: 4/3;
    }
    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      /* mirror for natural selfie view */
      transform: scaleX(-1);
    }
    video { object-fit: cover; }
    canvas { background: transparent; }

    /* ── finger count cards ── */
    .counts {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px 36px;
      text-align: center;
      min-width: 120px;
      transition: border-color 0.2s;
    }
    .card.active { border-color: rgba(56,189,248,0.4); }
    .card label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 8px;
    }
    .card .num {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      transition: color 0.2s;
    }
    #num-left  { color: #38bdf8; }
    #num-right { color: #f472b6; }
    #num-total { color: #a78bfa; }

    /* ── finger display ── */
    .fingers-display {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .hand-fingers {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .hand-fingers h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
    }
    .finger-dots {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .finger-dot {
      width: 14px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      transition: background 0.15s, height 0.15s;
    }
    /* thumb is shorter */
    .finger-dot:nth-child(1) { height: 32px; }
    .finger-dot:nth-child(2) { height: 52px; }
    .finger-dot:nth-child(3) { height: 56px; }
    .finger-dot:nth-child(4) { height: 48px; }
    .finger-dot:nth-child(5) { height: 38px; }
    .finger-dot.up { background: #38bdf8; }
    .hand-fingers.right .finger-dot.up { background: #f472b6; }

    /* ── face expression section ── */
    .face-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .face-section h2 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #444;
      margin-bottom: 4px;
    }
    .face-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: stretch;
    }
    .face-card { min-width: 150px; }
    .face-expr {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.5px;
      transition: color 0.25s;
    }
    .face-details {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 150px;
    }
    .face-metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 28px;
    }
    .fm-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
    }
    .fm-val {
      font-size: 0.8rem;
      font-weight: 600;
      transition: color 0.2s;
      color: #94a3b8;
    }

    /* ── status bar ── */
    #status {
      font-size: 0.82rem;
      color: #555;
      text-align: center;
    }
    #status.ok { color: #4ade80; }
    #status.warn { color: #facc15; }

    /* ── loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d0d0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
    }
    #loading p { color: #888; font-size: 0.9rem; }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Loading MediaPipe…</p>
  </div>

  <header>
    <h1>Hand Finger Tracker</h1>
    <p>Hold your hands up to the camera — fingers are counted in real time.</p>
  </header>

  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <!-- finger visualisation -->
  <div class="fingers-display">
    <div class="hand-fingers left" id="dots-left">
      <h3>Left hand</h3>
      <div class="finger-dots">
        <div class="finger-dot" data-i="0"></div>
        <div class="finger-dot" data-i="1"></div>
        <div class="finger-dot" data-i="2"></div>
        <div class="finger-dot" data-i="3"></div>
        <div class="finger-dot" data-i="4"></div>
      </div>
    </div>
    <div class="hand-fingers right" id="dots-right">
      <h3>Right hand</h3>
      <div class="finger-dots">
        <div class="finger-dot" data-i="0"></div>
        <div class="finger-dot" data-i="1"></div>
        <div class="finger-dot" data-i="2"></div>
        <div class="finger-dot" data-i="3"></div>
        <div class="finger-dot" data-i="4"></div>
      </div>
    </div>
  </div>

  <!-- numeric counts -->
  <div class="counts">
    <div class="card" id="card-left">
      <label>Left hand</label>
      <div class="num" id="num-left">–</div>
    </div>
    <div class="card" id="card-total">
      <label>Total</label>
      <div class="num" id="num-total">0</div>
    </div>
    <div class="card" id="card-right">
      <label>Right hand</label>
      <div class="num" id="num-right">–</div>
    </div>
  </div>

  <!-- face expression display -->
  <div class="face-section" id="face-section" style="display:none">
    <h2>Face Expression</h2>
    <div class="face-row">
      <div class="card face-card" id="card-face">
        <label>Expression</label>
        <div class="face-expr" id="face-expr">Neutral</div>
      </div>
      <div class="face-details">
        <div class="face-metric">
          <span class="fm-label">Eyes</span>
          <span class="fm-val" id="face-eyes">—</span>
        </div>
        <div class="face-metric">
          <span class="fm-label">Mouth</span>
          <span class="fm-val" id="face-mouth">—</span>
        </div>
        <div class="face-metric">
          <span class="fm-label">Brows</span>
          <span class="fm-val" id="face-brows">—</span>
        </div>
      </div>
    </div>
  </div>

  <p id="status" class="warn">Initialising camera…</p>

  <!-- MediaPipe Hands via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>

  <script>
    // ── DOM refs ──────────────────────────────────────────────────────────────
    const video      = document.getElementById('video');
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const loadingEl  = document.getElementById('loading');
    const loadingMsg = document.getElementById('loading-msg');
    const statusEl   = document.getElementById('status');
    const numLeft    = document.getElementById('num-left');
    const numRight   = document.getElementById('num-right');
    const numTotal   = document.getElementById('num-total');
    const cardLeft   = document.getElementById('card-left');
    const cardRight  = document.getElementById('card-right');
    const dotsLeft   = document.querySelectorAll('#dots-left .finger-dot');
    const dotsRight  = document.querySelectorAll('#dots-right .finger-dot');
    const faceSectionEl = document.getElementById('face-section');
    const faceExprEl    = document.getElementById('face-expr');
    const faceEyesEl    = document.getElementById('face-eyes');
    const faceMouthEl   = document.getElementById('face-mouth');
    const faceBrowsEl   = document.getElementById('face-brows');
    const cardFaceEl    = document.getElementById('card-face');

    // ── Landmark indices ──────────────────────────────────────────────────────
    //  0 = wrist
    //  1-4   = thumb   (CMC → TIP)
    //  5-8   = index   (MCP → TIP)
    //  9-12  = middle
    //  13-16 = ring
    //  17-20 = pinky
    const TIPS = [4, 8, 12, 16, 20];  // thumb + 4 fingers
    const PIPS = [3, 6, 10, 14, 18];  // one joint below each tip (thumb IP, others PIP)
    const MCPS = [5, 9, 13, 17];      // MCP knuckles for index → pinky

    // Hand skeleton connections for drawing
    const CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17],
    ];

    // ── Finger counting ───────────────────────────────────────────────────────

    // Cross product of (wrist→thumbCMC) × (wrist→pinkyMCP).
    // Positive → person's right hand; negative → person's left hand.
    function crossSign(lm) {
      const v1x = lm[1].x - lm[0].x, v1y = lm[1].y - lm[0].y;
      const v2x = lm[17].x - lm[0].x, v2y = lm[17].y - lm[0].y;
      return v1x * v2y - v1y * v2x;
    }

    // Returns an array of 5 booleans (thumb … pinky), true = finger extended.
    function getFingerStates(lm) {
      const states = [false, false, false, false, false];

      // Compute the hand's "up" direction: wrist → average of the four MCP knuckles.
      // Projecting onto this axis makes all checks orientation-independent — they work
      // whether the hand is upright, horizontal, tilted, or angled toward the camera.
      let ux = 0, uy = 0;
      for (const m of MCPS) { ux += lm[m].x; uy += lm[m].y; }
      ux = ux / 4 - lm[0].x;
      uy = uy / 4 - lm[0].y;
      const ulen = Math.sqrt(ux * ux + uy * uy);
      if (ulen > 1e-4) { ux /= ulen; uy /= ulen; }

      // proj: signed distance of landmark p along the "up" axis from the wrist.
      const proj = p => (p.x - lm[0].x) * ux + (p.y - lm[0].y) * uy;

      // Thumb abducts laterally — perpendicular to the finger axis.
      // (-uy, ux) is the perpendicular unit vector; crossSign gives chirality.
      const cs  = crossSign(lm);
      const qx  = -uy, qy = ux;
      const tTip = (lm[4].x - lm[0].x) * qx + (lm[4].y - lm[0].y) * qy;
      const tIP  = (lm[3].x - lm[0].x) * qx + (lm[3].y - lm[0].y) * qy;
      if (Math.abs(cs) < 0.015) {
        // Hand nearly edge-on: fall back to longitudinal extension check.
        states[0] = proj(lm[4]) > proj(lm[3]);
      } else {
        // Right hand (cs>0): thumb extends toward the negative-perpendicular side.
        // Left  hand (cs<0): thumb extends toward the positive-perpendicular side.
        states[0] = cs > 0 ? tTip < tIP : tTip > tIP;
      }

      // Fingers 1–4: tip must project further along the "up" axis than its PIP joint.
      // This catches bent/curled fingers regardless of how the hand is rotated.
      for (let i = 1; i <= 4; i++) {
        states[i] = proj(lm[TIPS[i]]) > proj(lm[PIPS[i]]);
      }

      return states;
    }

    // ── Canvas drawing ────────────────────────────────────────────────────────
    const COLORS = {
      Left:  { line: '#38bdf8', dot: '#0ea5e9', tip: '#7dd3fc' },
      Right: { line: '#f472b6', dot: '#ec4899', tip: '#fbcfe8' },
    };

    function px(lm) {
      return [lm.x * canvas.width, lm.y * canvas.height];
    }

    function drawHand(lm, label) {
      const c = COLORS[label] || COLORS.Left;

      // Connections
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = c.line + 'cc';
      for (const [a, b] of CONNECTIONS) {
        ctx.beginPath();
        ctx.moveTo(...px(lm[a]));
        ctx.lineTo(...px(lm[b]));
        ctx.stroke();
      }

      // Joints
      for (let i = 0; i < lm.length; i++) {
        const isTip = TIPS.includes(i);
        const [x, y] = px(lm[i]);
        ctx.beginPath();
        ctx.arc(x, y, isTip ? 7 : 5, 0, Math.PI * 2);
        ctx.fillStyle = isTip ? c.tip : c.dot;
        ctx.fill();
        ctx.strokeStyle = '#000a';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // ── Update UI ─────────────────────────────────────────────────────────────
    function updateDots(dotEls, states) {
      dotEls.forEach((el, i) => {
        el.classList.toggle('up', !!states[i]);
      });
    }

    // ── Face Mesh constants & helpers ────────────────────────────────────────

    // Landmark indices used for expression analysis
    const FL_EYE = { top: 159, bot: 145, lt: 33,  rt: 133 };  // left eye
    const FR_EYE = { top: 386, bot: 374, lt: 362, rt: 263 };  // right eye
    const F_MO   = { top:  13, bot:  14, lt:  61, rt: 291 };  // mouth
    const F_BL   = 55;   // left inner brow
    const F_BR   = 285;  // right inner brow

    // Closed outline paths drawn on the canvas (eyes, lips, brows)
    const F_EYE_L  = [33,246,161,160,159,158,157,173,133,155,154,153,145,144,163,7,33];
    const F_EYE_R  = [263,466,388,387,386,385,384,398,362,382,381,380,374,373,390,249,263];
    const F_LIPS   = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146,61];
    const F_BROW_L = [46,53,52,65,55];
    const F_BROW_R = [276,283,282,295,285];

    // Thresholds (geometry-based, scale-invariant via face-height normalisation)
    const EAR_BLINK   = 0.17;   // eye aspect ratio below this → blink
    const MAR_OPEN    = 0.20;   // mouth aspect ratio above this → open
    const SMILE_MIN   = 0.020;  // corner-above-top-lip / faceH → happy
    const BROW_RAISED = 0.105;  // brow-above-eye-top  / faceH → raised

    function fd(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

    function earOf(lm, e) {
      return fd(lm[e.top], lm[e.bot]) / (fd(lm[e.lt], lm[e.rt]) || 1e-4);
    }

    function analyseExpression(lm) {
      const faceH      = fd(lm[10], lm[152]) || 0.01;  // forehead → chin
      const earAvg     = (earOf(lm, FL_EYE) + earOf(lm, FR_EYE)) / 2;
      const mar        = fd(lm[F_MO.top], lm[F_MO.bot]) / (fd(lm[F_MO.lt], lm[F_MO.rt]) || 1e-4);
      // Smile: top-lip center y − average corner y, normalised; positive when corners rise.
      const smileScore = (lm[F_MO.top].y - (lm[F_MO.lt].y + lm[F_MO.rt].y) / 2) / faceH;
      // Brow raise: eye-top y − inner-brow y, normalised; larger when brows lift.
      const browScore  = ((lm[FL_EYE.top].y - lm[F_BL].y) + (lm[FR_EYE.top].y - lm[F_BR].y)) / (2 * faceH);

      const eyesClosed = earAvg    < EAR_BLINK;
      const mouthOpen  = mar       > MAR_OPEN;
      const smiling    = smileScore > SMILE_MIN;
      const browsUp    = browScore  > BROW_RAISED;

      let label, color;
      if      (eyesClosed)           { label = 'Blink';     color = '#60a5fa'; }
      else if (browsUp && mouthOpen) { label = 'Surprised'; color = '#f472b6'; }
      else if (smiling)              { label = 'Happy';     color = '#4ade80'; }
      else                           { label = 'Neutral';   color = '#94a3b8'; }

      return {
        label, color,
        eyes:  eyesClosed ? 'Closed' : 'Open',
        mouth: mouthOpen  ? 'Open'   : 'Closed',
        brows: browsUp    ? 'Raised' : 'Normal',
      };
    }

    function drawFace(lm) {
      function fp(i) { return [lm[i].x * canvas.width, lm[i].y * canvas.height]; }
      function tracePath(pts) {
        ctx.beginPath();
        ctx.moveTo(...fp(pts[0]));
        for (let k = 1; k < pts.length; k++) ctx.lineTo(...fp(pts[k]));
        ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(251,191,36,0.65)';
      ctx.lineWidth = 1.2;
      tracePath(F_EYE_L);
      tracePath(F_EYE_R);
      tracePath(F_LIPS);
      tracePath(F_BROW_L);
      tracePath(F_BROW_R);
    }

    // ── Face result handler ───────────────────────────────────────────────────
    let lastFaceSeen = 0;

    function onFaceResults(faceResults) {
      const faces = faceResults.multiFaceLandmarks || [];
      if (faces.length > 0) {
        lastFaceSeen = Date.now();
        const lm   = faces[0];
        drawFace(lm);
        const info = analyseExpression(lm);
        faceSectionEl.style.display  = '';
        faceExprEl.textContent       = info.label;
        faceExprEl.style.color       = info.color;
        faceEyesEl.textContent       = info.eyes;
        faceEyesEl.style.color       = info.color;
        faceMouthEl.textContent      = info.mouth;
        faceMouthEl.style.color      = info.color;
        faceBrowsEl.textContent      = info.brows;
        faceBrowsEl.style.color      = info.color;
        cardFaceEl.classList.add('active');
      } else if (Date.now() - lastFaceSeen > 2000) {
        faceSectionEl.style.display = 'none';
        cardFaceEl.classList.remove('active');
      }
    }

    // ── MediaPipe result handler ──────────────────────────────────────────────
    const EMPTY = [false, false, false, false, false];
    let lastSeen = 0;

    function onResults(results) {
      canvas.width  = video.videoWidth  || 640;
      canvas.height = video.videoHeight || 480;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const hands      = results.multiHandLandmarks || [];
      const handedness = results.multiHandedness    || [];

      updateDots(dotsLeft,  EMPTY);
      updateDots(dotsRight, EMPTY);

      let leftData = null, rightData = null;

      for (let i = 0; i < hands.length; i++) {
        const lm = hands[i];

        // Use MediaPipe's anatomical handedness label — it never flips when hands
        // cross or move to the center of frame.  MediaPipe labels in the raw
        // (unmirrored) camera frame: the person's right hand appears on the image's
        // left, so MediaPipe calls it 'Left'.  We invert the label here.
        const mpLabel = handedness[i]?.label;
        const isRight = mpLabel != null ? mpLabel === 'Left' : (1 - lm[0].x) > 0.5;

        const fingerStates = getFingerStates(lm);
        const count = fingerStates.filter(Boolean).length;

        drawHand(lm, isRight ? 'Right' : 'Left');

        if (isRight) {
          rightData = { fingerStates, count };
        } else {
          leftData  = { fingerStates, count };
        }
      }

      if (leftData)  updateDots(dotsLeft,  leftData.fingerStates);
      if (rightData) updateDots(dotsRight, rightData.fingerStates);

      numLeft.textContent  = leftData  ? leftData.count  : '–';
      numRight.textContent = rightData ? rightData.count : '–';
      numTotal.textContent = (leftData?.count ?? 0) + (rightData?.count ?? 0);

      cardLeft.classList.toggle('active',  !!leftData);
      cardRight.classList.toggle('active', !!rightData);

      if (hands.length > 0) {
        lastSeen = Date.now();
        statusEl.className = 'ok';
        statusEl.textContent = `Tracking ${hands.length} hand${hands.length > 1 ? 's' : ''}`;
      } else {
        const elapsed = Date.now() - lastSeen;
        statusEl.className = 'warn';
        statusEl.textContent = elapsed < 1500
          ? 'Tracking lost…'
          : 'No hands detected — show your hand to the camera';
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      try {
        loadingMsg.textContent = 'Loading MediaPipe models…';

        const handsModel = new Hands({
          locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`,
        });
        handsModel.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: 0.75,
          minTrackingConfidence: 0.6,
        });
        handsModel.onResults(onResults);

        const faceModel = new FaceMesh({
          locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${f}`,
        });
        faceModel.setOptions({
          maxNumFaces: 1,
          refineLandmarks: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });
        faceModel.onResults(onFaceResults);

        loadingMsg.textContent = 'Starting camera…';

        const camera = new Camera(video, {
          onFrame: async () => {
            await handsModel.send({ image: video });
            await faceModel.send({ image: video });
          },
          width: 640,
          height: 480,
        });

        await camera.start();
        loadingEl.style.display = 'none';
        statusEl.className = 'ok';
        statusEl.textContent = 'Camera active — show your hands!';
      } catch (err) {
        loadingEl.style.display = 'none';
        statusEl.className = '';
        statusEl.textContent = `Error: ${err.message}`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
