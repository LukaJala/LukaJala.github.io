<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcane Weave</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #e8e8e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      gap: 24px;
    }

    header {
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 6px;
      font-size: 0.88rem;
      color: #666;
    }

    /* ── camera + canvas overlay ── */
    .video-wrap {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08),
                  0 8px 48px rgba(0,0,0,0.7),
                  0 0 60px rgba(56,189,248,0.12);
      background: #111;
      /* clamp so it doesn't go off-screen */
      max-width: min(640px, 100vw - 32px);
      width: 100%;
      aspect-ratio: 4/3;
    }
    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      /* mirror for natural selfie view */
      transform: scaleX(-1);
    }
    video { object-fit: cover; }
    canvas { background: transparent; }

    /* ── finger count cards ── */
    .counts {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px 36px;
      text-align: center;
      min-width: 120px;
      transition: border-color 0.2s;
    }
    .card.active { border-color: rgba(56,189,248,0.4); }
    .card label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 8px;
    }
    .card .num {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      transition: color 0.2s;
    }
    #num-left  { color: #38bdf8; }
    #num-right { color: #f472b6; }
    #num-total { color: #a78bfa; }

    /* ── finger display ── */
    .fingers-display {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .hand-fingers {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .hand-fingers h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
    }
    .finger-dots {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .finger-dot {
      width: 14px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      transition: background 0.15s, height 0.15s;
    }
    /* thumb is shorter */
    .finger-dot:nth-child(1) { height: 32px; }
    .finger-dot:nth-child(2) { height: 52px; }
    .finger-dot:nth-child(3) { height: 56px; }
    .finger-dot:nth-child(4) { height: 48px; }
    .finger-dot:nth-child(5) { height: 38px; }
    .finger-dot.up { background: #38bdf8; }
    .hand-fingers.right .finger-dot.up { background: #f472b6; }

    /* ── status bar ── */
    #status {
      font-size: 0.82rem;
      color: #555;
      text-align: center;
    }
    #status.ok { color: #4ade80; }
    #status.warn { color: #facc15; }

    /* ── loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d0d0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
    }
    #loading p { color: #888; font-size: 0.9rem; }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Loading MediaPipe…</p>
  </div>

  <header>
    <h1>Arcane Weave</h1>
    <p>Move your fingers to weave light — pinch to spark, open your hand to bloom.</p>
  </header>

  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <!-- finger visualisation -->
  <div class="fingers-display">
    <div class="hand-fingers left" id="dots-left">
      <h3>Left hand</h3>
      <div class="finger-dots">
        <div class="finger-dot" data-i="0"></div>
        <div class="finger-dot" data-i="1"></div>
        <div class="finger-dot" data-i="2"></div>
        <div class="finger-dot" data-i="3"></div>
        <div class="finger-dot" data-i="4"></div>
      </div>
    </div>
    <div class="hand-fingers right" id="dots-right">
      <h3>Right hand</h3>
      <div class="finger-dots">
        <div class="finger-dot" data-i="0"></div>
        <div class="finger-dot" data-i="1"></div>
        <div class="finger-dot" data-i="2"></div>
        <div class="finger-dot" data-i="3"></div>
        <div class="finger-dot" data-i="4"></div>
      </div>
    </div>
  </div>

  <!-- numeric counts -->
  <div class="counts">
    <div class="card" id="card-left">
      <label>Left hand</label>
      <div class="num" id="num-left">–</div>
    </div>
    <div class="card" id="card-total">
      <label>Total</label>
      <div class="num" id="num-total">0</div>
    </div>
    <div class="card" id="card-right">
      <label>Right hand</label>
      <div class="num" id="num-right">–</div>
    </div>
  </div>

  <p id="status" class="warn">Initialising camera…</p>

  <!-- MediaPipe Hands via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
  <script>
    // ── DOM refs ──────────────────────────────────────────────────────────────
    const video      = document.getElementById('video');
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const loadingEl  = document.getElementById('loading');
    const loadingMsg = document.getElementById('loading-msg');
    const statusEl   = document.getElementById('status');
    const numLeft    = document.getElementById('num-left');
    const numRight   = document.getElementById('num-right');
    const numTotal   = document.getElementById('num-total');
    const cardLeft   = document.getElementById('card-left');
    const cardRight  = document.getElementById('card-right');
    const dotsLeft  = document.querySelectorAll('#dots-left .finger-dot');
    const dotsRight = document.querySelectorAll('#dots-right .finger-dot');

    // ── Landmark indices ──────────────────────────────────────────────────────
    //  0 = wrist
    //  1-4   = thumb   (CMC → TIP)
    //  5-8   = index   (MCP → TIP)
    //  9-12  = middle
    //  13-16 = ring
    //  17-20 = pinky
    const TIPS = [4, 8, 12, 16, 20];  // thumb + 4 fingers
    const PIPS = [3, 6, 10, 14, 18];  // one joint below each tip (thumb IP, others PIP)
    const MCPS = [5, 9, 13, 17];      // MCP knuckles for index → pinky

    // Hand skeleton connections for drawing
    const CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17],
    ];

    // ── Finger counting ───────────────────────────────────────────────────────

    // Cross product of (wrist→thumbCMC) × (wrist→pinkyMCP).
    // Positive → person's right hand; negative → person's left hand.
    function crossSign(lm) {
      const v1x = lm[1].x - lm[0].x, v1y = lm[1].y - lm[0].y;
      const v2x = lm[17].x - lm[0].x, v2y = lm[17].y - lm[0].y;
      return v1x * v2y - v1y * v2x;
    }

    // Returns an array of 5 booleans (thumb … pinky), true = finger extended.
    function getFingerStates(lm) {
      const states = [false, false, false, false, false];

      // Compute the hand's "up" direction: wrist → average of the four MCP knuckles.
      // Projecting onto this axis makes all checks orientation-independent — they work
      // whether the hand is upright, horizontal, tilted, or angled toward the camera.
      let ux = 0, uy = 0;
      for (const m of MCPS) { ux += lm[m].x; uy += lm[m].y; }
      ux = ux / 4 - lm[0].x;
      uy = uy / 4 - lm[0].y;
      const ulen = Math.sqrt(ux * ux + uy * uy);
      if (ulen > 1e-4) { ux /= ulen; uy /= ulen; }

      // proj: signed distance of landmark p along the "up" axis from the wrist.
      const proj = p => (p.x - lm[0].x) * ux + (p.y - lm[0].y) * uy;

      // Thumb abducts laterally — perpendicular to the finger axis.
      // (-uy, ux) is the perpendicular unit vector; crossSign gives chirality.
      const cs  = crossSign(lm);
      const qx  = -uy, qy = ux;
      const tTip = (lm[4].x - lm[0].x) * qx + (lm[4].y - lm[0].y) * qy;
      const tIP  = (lm[3].x - lm[0].x) * qx + (lm[3].y - lm[0].y) * qy;
      if (Math.abs(cs) < 0.015) {
        // Hand nearly edge-on: fall back to longitudinal extension check.
        states[0] = proj(lm[4]) > proj(lm[3]);
      } else {
        // Right hand (cs>0): thumb extends toward the negative-perpendicular side.
        // Left  hand (cs<0): thumb extends toward the positive-perpendicular side.
        states[0] = cs > 0 ? tTip < tIP : tTip > tIP;
      }

      // Fingers 1–4: tip must project further along the "up" axis than its PIP joint.
      // This catches bent/curled fingers regardless of how the hand is rotated.
      for (let i = 1; i <= 4; i++) {
        states[i] = proj(lm[TIPS[i]]) > proj(lm[PIPS[i]]);
      }

      return states;
    }

    // ── Update UI ─────────────────────────────────────────────────────────────
    function updateDots(dotEls, states) {
      dotEls.forEach((el, i) => el.classList.toggle('up', !!states[i]));
    }

    // ── Arcane effects system ─────────────────────────────────────────────────

    // Per-finger hues: thumb=gold, index=cyan, middle=blue, ring=violet, pinky=magenta
    const TIP_H = [45, 190, 220, 270, 310];

    const particles   = [];
    const MAX_PTCL    = 420;
    const TRAIL_LEN   = 22;
    const trails      = { left: Array.from({length:5},()=>[]), right: Array.from({length:5},()=>[]) };
    const pinchActive = { left: new Set(),  right: new Set()  };
    const bloomCD     = { left: 0,          right: 0          };
    const stillness   = { left: 0,          right: 0          };
    let efxFrame = 0;

    const PINCH_PX   = 44;
    const MAX_CONN_F = 0.48;   // fraction of canvas.width where connections fade out

    function palmPx(lm) {
      let x = 0, y = 0;
      for (const m of MCPS) { x += lm[m].x; y += lm[m].y; }
      return { x: x/4 * canvas.width, y: y/4 * canvas.height };
    }

    // ── Drawing layers ────────────────────────────────────────────────────────

    function drawHandStructure(lm) {
      ctx.save();
      ctx.strokeStyle = 'rgba(180,210,255,0.10)';
      ctx.lineWidth = 1;
      for (const [a, b] of CONNECTIONS) {
        ctx.beginPath();
        ctx.moveTo(lm[a].x * canvas.width, lm[a].y * canvas.height);
        ctx.lineTo(lm[b].x * canvas.width, lm[b].y * canvas.height);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawConnections(tipPx) {
      const maxD = canvas.width * MAX_CONN_F;
      ctx.save();
      for (let a = 0; a < 5; a++) {
        for (let b = a+1; b < 5; b++) {
          const [ax,ay] = tipPx[a], [bx,by] = tipPx[b];
          const d = Math.hypot(ax-bx, ay-by);
          if (d >= maxD) continue;
          const t  = 1 - d/maxD;
          const ha = TIP_H[a], hb = TIP_H[b];
          // Soft glow halo
          ctx.strokeStyle = `hsla(${(ha+hb)*.5},100%,70%,${0.10*t})`;
          ctx.lineWidth   = 16*t;
          ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
          // Crisp gradient core
          const g = ctx.createLinearGradient(ax,ay,bx,by);
          g.addColorStop(0, `hsla(${ha},100%,78%,${0.90*t})`);
          g.addColorStop(1, `hsla(${hb},100%,78%,${0.90*t})`);
          ctx.strokeStyle = g;
          ctx.lineWidth   = 1 + 2.8*t;
          ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawTipOrbs(tipPx) {
      ctx.save();
      for (let f = 0; f < 5; f++) {
        const [x,y] = tipPx[f], h = TIP_H[f];
        const pulse = 0.84 + 0.16 * Math.sin(efxFrame*0.09 + f*1.2);
        const r = 7*pulse;
        const grd = ctx.createRadialGradient(x,y,0, x,y, r*3.5);
        grd.addColorStop(0,   `hsla(${h},100%,88%,0.55)`);
        grd.addColorStop(0.4, `hsla(${h},100%,65%,0.15)`);
        grd.addColorStop(1,   `hsla(${h},100%,65%,0)`);
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(x, y, r*3.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = `hsla(${h},100%,97%,0.93)`;
        ctx.beginPath(); ctx.arc(x, y, r,     0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    function drawTrails(side) {
      ctx.save();
      const hist = trails[side];
      for (let f = 0; f < 5; f++) {
        const h = TIP_H[f];
        hist[f].forEach(({x,y}, i) => {
          const p = i/TRAIL_LEN;
          ctx.globalAlpha = (1-p)*0.46;
          ctx.fillStyle   = `hsl(${h},100%,80%)`;
          ctx.beginPath();
          ctx.arc(x, y, Math.max((1-p)*4.5, 0.5), 0, Math.PI*2);
          ctx.fill();
        });
      }
      ctx.restore();
    }

    // Rotating 6-pointed sigil that materialises over a still palm
    function drawRune(palm, intensity) {
      ctx.save();
      ctx.translate(palm.x, palm.y);
      ctx.globalAlpha = intensity;
      const rot = efxFrame*0.007;
      for (let pass = 0; pass < 2; pass++) {
        ctx.save();
        ctx.rotate(pass===0 ? rot : -rot*0.7);
        const rr = 58 + pass*9;
        ctx.strokeStyle = pass===0 ? 'hsla(270,100%,72%,0.85)' : 'hsla(45,100%,70%,0.55)';
        ctx.lineWidth = 1.3;
        ctx.beginPath(); ctx.arc(0,0,rr,0,Math.PI*2); ctx.stroke();
        ctx.beginPath();
        for (let k = 0; k < 7; k++) {
          const a   = (k/6)*Math.PI*2 - Math.PI/2;
          const len = k%2===0 ? rr*0.82 : rr*0.42;
          k===0 ? ctx.moveTo(Math.cos(a)*len, Math.sin(a)*len)
                : ctx.lineTo(Math.cos(a)*len, Math.sin(a)*len);
        }
        ctx.closePath(); ctx.stroke();
        ctx.restore();
      }
      ctx.fillStyle = 'hsla(270,100%,82%,0.9)';
      for (let k = 0; k < 6; k++) {
        const a = (k/6)*Math.PI*2 - Math.PI/2 + rot;
        ctx.beginPath();
        ctx.arc(Math.cos(a)*58*0.82, Math.sin(a)*58*0.82, 2.5, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }

    // ── Particle system ───────────────────────────────────────────────────────

    function spawnP(x, y, vx, vy, h, size, decay, type) {
      if (particles.length >= MAX_PTCL) particles.shift();
      particles.push({x, y, vx, vy, h, size, decay, life:1, type});
    }

    function burst(x, y, n, h1, h2) {
      for (let i = 0; i < n; i++) {
        const a = (i/n)*Math.PI*2 + Math.random()*0.7;
        const s = 2.5 + Math.random()*5.5;
        spawnP(x, y, Math.cos(a)*s, Math.sin(a)*s - 0.8,
               Math.random()<0.5?h1:h2,
               3+Math.random()*4.5, 0.019+Math.random()*0.022,
               Math.random()<0.5?'star':'orb');
      }
    }

    function updateAndDrawParticles() {
      for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.95; p.vy *= 0.95; p.vy += 0.034;
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i,1); continue; }

        ctx.save();
        const r = p.size * p.life;

        if (p.type === 'star') {
          ctx.globalAlpha = p.life * p.life;
          ctx.fillStyle   = `hsl(${p.h},100%,93%)`;
          ctx.beginPath();
          for (let k = 0; k < 8; k++) {
            const a   = (k/8)*Math.PI*2 - Math.PI/2;
            const len = k%2===0 ? r : r*0.37;
            k===0 ? ctx.moveTo(p.x+Math.cos(a)*len, p.y+Math.sin(a)*len)
                  : ctx.lineTo(p.x+Math.cos(a)*len, p.y+Math.sin(a)*len);
          }
          ctx.closePath(); ctx.fill();
        } else {
          // Two-pass cheap glow (no radialGradient for perf)
          ctx.globalAlpha = p.life * p.life * 0.28;
          ctx.fillStyle   = `hsl(${p.h},100%,68%)`;
          ctx.beginPath(); ctx.arc(p.x, p.y, r*2.2, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = p.life * p.life;
          ctx.fillStyle   = `hsl(${p.h},100%,93%)`;
          ctx.beginPath(); ctx.arc(p.x, p.y, r,     0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
    }

    // ── Per-frame emitters ────────────────────────────────────────────────────

    function updateTrails(side, tipPx) {
      const hist = trails[side];
      for (let f = 0; f < 5; f++) {
        hist[f].unshift({x: tipPx[f][0], y: tipPx[f][1]});
        if (hist[f].length > TRAIL_LEN) hist[f].pop();
      }
    }

    function emitVelocitySparks(side, tipPx) {
      const hist = trails[side];
      for (let f = 0; f < 5; f++) {
        if (hist[f].length < 4) continue;
        const vx  = hist[f][0].x - hist[f][3].x;
        const vy  = hist[f][0].y - hist[f][3].y;
        const spd = Math.hypot(vx, vy);
        if (spd < 9) continue;
        const n = Math.min(Math.floor(spd/7), 5);
        for (let i = 0; i < n; i++) {
          const a = Math.atan2(vy,vx) + (Math.random()-0.5)*1.8;
          const s = spd*(0.15+Math.random()*0.35);
          spawnP(tipPx[f][0], tipPx[f][1], Math.cos(a)*s, Math.sin(a)*s,
                 TIP_H[f], 2+Math.random()*3.5, 0.038+Math.random()*0.030, 'orb');
        }
      }
    }

    function detectPinches(side, tipPx) {
      const active = pinchActive[side];
      for (let a = 0; a < 5; a++) {
        for (let b = a+1; b < 5; b++) {
          const key = `${a}-${b}`;
          const d   = Math.hypot(tipPx[a][0]-tipPx[b][0], tipPx[a][1]-tipPx[b][1]);
          if (d < PINCH_PX && !active.has(key)) {
            active.add(key);
            burst((tipPx[a][0]+tipPx[b][0])/2, (tipPx[a][1]+tipPx[b][1])/2,
                  24, TIP_H[a], TIP_H[b]);
          } else if (d >= PINCH_PX) {
            active.delete(key);
          }
        }
      }
    }

    function tryPalmBloom(side, palm) {
      if (bloomCD[side] > 0) return;
      bloomCD[side] = 80;
      for (let i = 0; i < 45; i++) {
        const a = Math.random()*Math.PI*2, s = 1.5+Math.random()*5;
        spawnP(palm.x, palm.y, Math.cos(a)*s, Math.sin(a)*s-2.5,
               TIP_H[Math.floor(Math.random()*5)],
               5+Math.random()*8, 0.010+Math.random()*0.016,
               Math.random()<0.55?'orb':'star');
      }
    }

    // Crackling energy arc between both palms when two hands are in view
    function drawCrossHandArc(lmL, lmR) {
      const pL = palmPx(lmL), pR = palmPx(lmR);
      const f  = efxFrame*0.055, segs = 28;
      ctx.save();
      for (let pass = 0; pass < 2; pass++) {
        ctx.strokeStyle = pass===0 ? 'rgba(167,139,250,0.62)' : 'rgba(167,139,250,0.14)';
        ctx.lineWidth   = pass===0 ? 1.5 : 9;
        ctx.beginPath();
        for (let i = 0; i <= segs; i++) {
          const t  = i/segs;
          const j1 = (pass===0?11:22)*Math.sin(t*8*Math.PI + (pass?-f:f));
          const j2 = (pass===0? 8:16)*Math.cos(t*6*Math.PI + f);
          const x  = pL.x + (pR.x-pL.x)*t + j1;
          const y  = pL.y + (pR.y-pL.y)*t + j2;
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      // Trickle particles along the arc
      if (Math.random() < 0.27) {
        const t = Math.random();
        spawnP(pL.x+(pR.x-pL.x)*t+(Math.random()-0.5)*18,
               pL.y+(pR.y-pL.y)*t+(Math.random()-0.5)*18,
               (Math.random()-0.5)*2, -1.5-Math.random(),
               270, 2.5+Math.random()*2.5, 0.04, 'orb');
      }
      ctx.restore();
    }

    // Base pass for one hand: structure, trails, connections, and particle emission
    function drawHandBase(lm, side) {
      const tipPx = TIPS.map(i => [lm[i].x*canvas.width, lm[i].y*canvas.height]);
      const [, ix, mx, rx, pk] = getFingerStates(lm);

      updateTrails(side, tipPx);
      drawHandStructure(lm);
      drawTrails(side);
      drawConnections(tipPx);
      emitVelocitySparks(side, tipPx);
      detectPinches(side, tipPx);
      bloomCD[side] = Math.max(0, bloomCD[side]-1);

      // Bloom when all four fingers are extended
      if (ix && mx && rx && pk) tryPalmBloom(side, palmPx(lm));

      // Accumulate stillness; draw rune once calm for ~2 s
      const avgSpd = trails[side].reduce((s, h) =>
        s + (h.length >= 4 ? Math.hypot(h[0].x-h[3].x, h[0].y-h[3].y) : 0), 0) / 5;
      if (avgSpd < 3.5) stillness[side] = Math.min(stillness[side]+1, 120);
      else              stillness[side] = Math.max(stillness[side]-4, 0);
      if (stillness[side] > 20) drawRune(palmPx(lm), stillness[side]/120);
    }

    // ── MediaPipe result handler ──────────────────────────────────────────────
    const EMPTY = [false, false, false, false, false];
    let lastSeen = 0;

    function onResults(results) {
      canvas.width  = video.videoWidth  || 640;
      canvas.height = video.videoHeight || 480;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      efxFrame++;

      const hands      = results.multiHandLandmarks || [];
      const handedness = results.multiHandedness    || [];

      updateDots(dotsLeft,  EMPTY);
      updateDots(dotsRight, EMPTY);

      let leftData = null, rightData = null;

      for (let i = 0; i < hands.length; i++) {
        const lm      = hands[i];
        const mpLabel = handedness[i]?.label;
        const isRight = mpLabel != null ? mpLabel === 'Left' : (1 - lm[0].x) > 0.5;
        const fingerStates = getFingerStates(lm);
        const count        = fingerStates.filter(Boolean).length;
        if (isRight) rightData = { fingerStates, count, lm };
        else         leftData  = { fingerStates, count, lm };
      }

      // Layer 1 — hand structure, trails, connections, particle emission
      if (leftData)              drawHandBase(leftData.lm,  'left');
      if (rightData)             drawHandBase(rightData.lm, 'right');
      if (leftData && rightData) drawCrossHandArc(leftData.lm, rightData.lm);

      // Layer 2 — particles float above connections
      updateAndDrawParticles();

      // Layer 3 — tip orbs on top of everything
      if (leftData)
        drawTipOrbs(TIPS.map(i => [leftData.lm[i].x  * canvas.width, leftData.lm[i].y  * canvas.height]));
      if (rightData)
        drawTipOrbs(TIPS.map(i => [rightData.lm[i].x * canvas.width, rightData.lm[i].y * canvas.height]));

      // Reset trail / pinch / stillness for absent hands
      if (!leftData) {
        trails.left.forEach(t  => t.length = 0);
        pinchActive.left.clear();
        stillness.left = 0;
      }
      if (!rightData) {
        trails.right.forEach(t => t.length = 0);
        pinchActive.right.clear();
        stillness.right = 0;
      }

      if (leftData)  updateDots(dotsLeft,  leftData.fingerStates);
      if (rightData) updateDots(dotsRight, rightData.fingerStates);

      numLeft.textContent  = leftData  ? leftData.count  : '–';
      numRight.textContent = rightData ? rightData.count : '–';
      numTotal.textContent = (leftData?.count ?? 0) + (rightData?.count ?? 0);

      cardLeft.classList.toggle('active',  !!leftData);
      cardRight.classList.toggle('active', !!rightData);

      if (hands.length > 0) {
        lastSeen = Date.now();
        statusEl.className = 'ok';
        statusEl.textContent = `Tracking ${hands.length} hand${hands.length > 1 ? 's' : ''}`;
      } else {
        const elapsed = Date.now() - lastSeen;
        statusEl.className = 'warn';
        statusEl.textContent = elapsed < 1500
          ? 'Tracking lost…'
          : 'No hands detected — show your hands!';
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      try {
        loadingMsg.textContent = 'Loading MediaPipe model…';

        const hands = new Hands({
          locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`,
        });

        hands.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: 0.75,
          minTrackingConfidence: 0.6,
        });

        hands.onResults(onResults);

        loadingMsg.textContent = 'Starting camera…';

        const camera = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 640,
          height: 480,
        });

        await camera.start();
        loadingEl.style.display = 'none';
        statusEl.className = 'ok';
        statusEl.textContent = 'Camera active — show your hands!';
      } catch (err) {
        loadingEl.style.display = 'none';
        statusEl.className = '';
        statusEl.textContent = `Error: ${err.message}`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
